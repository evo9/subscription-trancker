services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    volumes:
      - ./apps/api:/var/www/api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/api/public:/var/www/api/public:ro
    depends_on:
      - api
      - web
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    # Canonical entry is nginx :80; 3000 is exposed only for direct/debug access.
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      # Single origin: the SPA calls the API on the same host via /api.
      NEXT_PUBLIC_API_URL: http://localhost
      # Reliable HMR for bind-mounted source on macOS/Windows.
      WATCHPACK_POLLING: "true"
    networks:
      - app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-subscription_tracker}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: php artisan queue:work
    volumes:
      - ./apps/api:/var/www/api
    env_file: .env
    depends_on:
      - api
      - redis
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: php artisan schedule:work
    volumes:
      - ./apps/api:/var/www/api
    env_file: .env
    depends_on:
      - api
    networks:
      - app

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-secret}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

volumes:
  postgres_data:
  pgadmin_data:

networks:
  app:
    driver: bridge
